services:
  onlyoffice-documentserver:
    image: jiriks74/onlyoffice-documentserver:latest
    container_name: onlyoffice-documentserver
    networks:
      - onlyoffice-net
    depends_on:
      - onlyoffice-postgresql
      - onlyoffice-rabbitmq
    environment:
      - DB_TYPE=postgres
      - DB_HOST=onlyoffice-postgresql
      - DB_PORT=5432
      - DB_NAME=onlyoffice
      - DB_USER=onlyoffice
      - AMQP_URI=amqp://guest:guest@onlyoffice-rabbitmq
      # Uncomment strings below to enable the JSON Web Token validation.
      - JWT_ENABLED=true
      - JWT_SECRET={{ onlyoffice_jwt_secret }}
      - JWT_HEADER=Authorization
      - JWT_IN_BODY=true
      # Uncomment the line below to set larger file limits (about 1GB)
      # - LARGER_FILE_LIMITS=true
    ports:
      - "8081:80"
      - "8443:443"
    stdin_open: true
    restart: always
    stop_grace_period: 120s
    volumes:
      # Uncomment the line below to get access to the slide themes directory.
      # To use the themes, copy them to the slideThemes directory and run `docker exec -it <container-name> /usr/bin/documentserver-generate-allfonts.sh`
      # - ./slideThemes:/var/www/onlyoffice/documentserver/sdkjs/slide/themes/src
      - /var/www/onlyoffice/Data
      - /var/log/onlyoffice
      - /var/lib/onlyoffice/documentserver/App_Data/cache/files
      - /var/www/onlyoffice/documentserver-example/public/files
      - /usr/share/fonts

  onlyoffice-rabbitmq:
    container_name: onlyoffice-rabbitmq
    image: rabbitmq:3.12
    networks:
      - onlyoffice-net
    restart: always
    expose:
      - "5672"

  onlyoffice-postgresql:
    container_name: onlyoffice-postgresql
    image: postgres:12
    networks:
      - onlyoffice-net
    environment:
      - POSTGRES_DB=onlyoffice
      - POSTGRES_USER=onlyoffice
      - POSTGRES_HOST_AUTH_METHOD=trust
    restart: always
    expose:
      - "5432"
    volumes:
      - postgresql_data:/var/lib/postgresql

volumes:
  postgresql_data:

networks:
  onlyoffice-net:
    external: true
