services:
  influxdb:
    image: influxdb:2
    restart: unless-stopped
    ports:
      - 192.168.178.144:8086:8086
    volumes:
      - ./influxdb-data:/var/lib/influxdb2
      - ./influxdb-config:/etc/influxdb2

  telegraf:
    image: telegraf:latest
    restart: unless-stopped
    user: telegraf:988
    volumes:
      - ./telegraf.conf:/etc/telegraf/telegraf.conf:ro
      - /sys:/host/sys:ro
      - /proc:/host/proc:ro
      - /dev:/dev:ro
    environment:
      - HOST_SYS=/host/sys
      - HOST_PROC=/host/proc

  grafana:
    image: grafana/grafana:latest
    restart: unless-stopped
    ports:
      - 192.168.178.144:3000:3000
    volumes:
      - ./grafana-data:/var/lib/grafana

volumes:
  influxdb-data:
  influxdb-config:
  grafana-data: