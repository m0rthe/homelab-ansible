[global_tags]
  host = "pi5"

[agent]
  interval = "60s"
  round_interval = true
  flush_interval = "60s"
  hostname = "pi5"

[[outputs.influxdb_v2]]
  urls = ["http://influxdb:8086"]
  token = "{{ influxdb_token }}"
  organization = "homelab"
  bucket = "homelab"

[[inputs.cpu]]
  percpu = true
  totalcpu = true

[[inputs.mem]]

[[inputs.swap]]

[[inputs.disk]]
  ignore_fs = ["tmpfs", "devtmpfs", "overlay", "aufs"]

[[inputs.diskio]]
  devices = ["nvme0n1"]

[[inputs.net]]
  interfaces = ["eth0"]

[[inputs.system]]

[[inputs.temp]]

[[inputs.processes]]

[[inputs.kernel]]

[[inputs.netstat]]