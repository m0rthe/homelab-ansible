services:
  ntfy:
    image: binwiederhier/ntfy
    container_name: ntfy
    command:
      - serve
    environment:
      - TZ=Europe/Berlin    # optional: set desired timezone
    user: "1000:1000" # optional: replace with your own user/group or uid/gid
    volumes:
      - /home/pi/docker/ntfy/cache:/var/cache/ntfy
      - /home/pi/docker/ntfy/config:/etc/ntfy
    ports:
      - "192.168.178.144:8090:80"
    healthcheck: # optional: remember to adapt the host:port to your environment
        test: ["CMD-SHELL", "wget -q --tries=1 http://localhost:80/v1/health -O - | grep -Eo '\"healthy\"\\s*:\\s*true' || exit 1"]
        interval: 60s
        timeout: 10s
        retries: 3
        start_period: 40s
    restart: unless-stopped
    init: true # needed, if healthcheck is used. Prevents zombie processes
